<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Night at the Museum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #e0dcd6; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas { display: block; }

    /* Flash overlay */
    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.05s ease-in;
    }

    /* UI Controls */
    #controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 10;
    }

    /* Shared button base — frosted glass on bright background */
    #btn-life, .btn-nav, #toggle-view button {
      font-family: system-ui, -apple-system, sans-serif;
    }

    #btn-life {
      padding: 12px 32px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 0, 0, 0.18);
      color: #1a1a18;
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #btn-life:hover {
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
    }
    #btn-life:disabled {
      opacity: 0.35;
      cursor: default;
      box-shadow: none;
    }

    #toggle-view {
      display: none;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 0, 0, 0.14);
      border-radius: 20px;
      overflow: hidden;
    }
    #toggle-view button {
      padding: 7px 22px;
      background: transparent;
      border: none;
      color: rgba(20, 20, 18, 0.45);
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #toggle-view button.active {
      background: rgba(0, 0, 0, 0.1);
      color: #1a1a18;
    }

    /* Navigation arrows */
    #nav-row {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .btn-nav {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 50%;
      color: #1a1a18;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-nav:hover {
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }
    .btn-nav:disabled {
      opacity: 0.3;
      cursor: default;
      box-shadow: none;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #e8e4de;
      z-index: 200;
      color: rgba(30, 28, 24, 0.55);
      letter-spacing: 3px;
      font-size: 11px;
      text-transform: uppercase;
      gap: 20px;
      transition: opacity 0.8s ease;
    }
    #loading-bar-wrap {
      width: 180px;
      height: 1px;
      background: rgba(30, 28, 24, 0.15);
    }
    #loading-bar {
      height: 1px;
      width: 0%;
      background: rgba(30, 28, 24, 0.5);
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="loading">
    <span>Preparing the exhibit</span>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <div id="flash"></div>
  <div id="canvas-container"></div>

  <div id="controls">
    <button id="btn-life" disabled>✦ Bring Static Exhibition to Life</button>
    <div id="toggle-view">
      <button id="btn-mesh" class="active">Mesh</button>
      <button id="btn-bones">Skeleton</button>
    </div>
    <div id="nav-row">
      <button class="btn-nav" id="btn-prev">&#8592;</button>
      <button class="btn-nav" id="btn-next">&#8594;</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
